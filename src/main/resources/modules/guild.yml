# Guild foundation settings
foundation:
  min-name-length: 3
  max-name-length: 32
  min-tag-length: 2
  max-tag-length: 6
  # Starting cuboid radius (blocks from center)
  starting-radius: 16
  # Minimum distance between guild cuboid edges when creating a guild
  min-distance-between-guilds: 5
  # Y level where the guild egg cube is created
  egg-center-y: 20
  # Block placed in the center of the guild egg cube
  egg-block: DRAGON_EGG
  # Minimum distance from the world spawn when creating a guild
  min-distance-from-spawn: 200
  # Whether to announce guild creation in global chat
  announce-globally: false

# Cost of creating a guild (items)
foundation-cost:
  enabled: true
  items:
    - material: DIAMOND_BLOCK
      amount: 16
    - material: EMERALD_BLOCK
      amount: 8
    - material: NETHERITE_INGOT
      amount: 4

foundation-requirements:
  cooldown-minutes: 2880
  max-guilds-per-player: 1
  blocked-worlds:
    - "world_spawn"
    - "world_arena"

# Cuboid protection settings
cuboid:
  # How long building and destroying is blocked after TNT explodes inside the cuboid (seconds). 0 = disabled.
  tnt-build-cooldown-seconds: 60

disband:
  # Time to confirm /guild disband confirm after /guild disband (seconds)
  timeout-seconds: 60
  refund:
    # Whether to return a percentage of the foundation cost items
    enabled: false
    # Percentage of the foundation cost returned (0.0 - 1.0)
    percentage: 0.5

ranks:
  leader:
    name: "Lider"
    weight: 100
  coleader:
    name: "Co-Lider"
    weight: 80
  moderator:
    name: "Moderator"
    weight: 60
  member:
    name: "Czlonek"
    weight: 40
  recruit:
    name: "Rekrut"
    weight: 20

member-management:
  max-members: 10
  # How long an invite stays valid (in minutes)
  invite-timeout-minutes: 10
  # Max pending invites sent by one guild at a time
  max-invites-per-guild: 5
  # Cooldown after leaving a guild before joining a new one (in minutes)
  cooldown-minutes-after-leave: 1440
  # Optional one-time item cost for joining a guild via invitation
  join-cost:
    enabled: false
    items:
      - material: DIAMOND
        amount: 16

# Guild settings (Task 1.4)
settings:
  home:
    # Delay before teleporting to guild home (seconds). 0 = instant.
    teleport-delay-seconds: 5
    # Cooldown between /guild home uses (seconds).
    cooldown-seconds: 300
  description:
    max-length: 256
  # Default guild flags for newly created guilds
  flags:
    is-public: true
    allow-join-requests: false
    show-home: false

# Relation colors used for guild tags (chat, nameplate, TAB).
# Accepted formats: MiniMessage (<color>) or legacy (&k).
relation-colors:
  guildless: "<gray>"
  member: "<green>"
  ally: "<dark_aqua>"
  enemy: "<red>"
  truce: "<yellow>"
  neutral: "<gray>"

# Guild chat formatting
chat:
  enabled: true
  # Available placeholders: {tag}, {guild}, {rank_letter}, {player}
  # The {tag} placeholder is automatically colored by the viewer's relation to the speaker's guild.
  # Rank letter is shown only to members of the same guild and is automatically wrapped in brackets.
  format: "<dark_gray>[{tag}]{rank_letter} <white>{player}<gray>: "
  # One-letter abbreviation shown next to the guild tag.
  rank-letters:
    leader: "L"
    coleader: "Z"
    moderator: "M"
    member: "C"
    recruit: "R"
  # MiniMessage color of the rank letter (to distinguish it from the tag).
  rank-letter-colors:
    leader: "<gold>"
    coleader: "<aqua>"
    moderator: "<green>"
    member: "<gray>"
    recruit: "<dark_gray>"
