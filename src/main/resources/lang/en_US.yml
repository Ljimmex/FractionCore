      success: "<green>Set cuboid flag <yellow>{flag}</yellow> to <yellow>{value}</yellow>."
      error_no_permission: "<red>Only the leader or co-leader can manage cuboid flags."
      error_invalid: "<red>Invalid flag or value. Available flags: BUILD, DESTROY, USE, TNT, INTERACT, FRIENDLY_FIRE. Values: ALLOW, DENY, MEMBERS, ALLIES, LEADER."
      error_no_cuboid: "<red>Your guild does not have a cuboid."
      error_generic: "<red>An error occurred while changing the cuboid flag."
  player_not_found: "<red>Player <yellow>{target}</yellow> not found."
  not_found: "<red>Guild not found.</red>"
  no_guild: "<red>You do not belong to any guild.</red>"
  not_member: "<red>Player {player} is not a member of your guild.</red>"

  help:
    # Help messages use |- block scalars so one key can hold multiple lines.
    # This keeps related lines grouped without one key per line.
    separator: "&8&m----------------------------------------"
    main:
      title: "&6&lFractionCore &8» &eHelp"
      welcome: "&7Welcome to the plugin help panel!"
      available_commands: "&6Available commands:"
      info_header: "&6Information:"
      plugin: "&7Plugin: &eFractionCore"
      version: "&7Version: &e{version}"
      author: "&7Author: &e{author}"
      lines: |-
        &e/guild help &8- &7Shows this help
        &e/guild help guild &8- &7Guild commands
        &e/guild help admin &8- &7Admin commands
        &e/guild create <name> <tag> &8- &7Create a guild
        &e/guild invite <nick> &8- &7Invite a player
        &e/guild join <tag> &8- &7Join a guild
        &e/guild leave &8- &7Leave the guild
        &e/guild info [tag] &8- &7Guild information
        &e/guild home &8- &7Teleport to guild home
    guild:
      title: "&6&lFractionCore &8» &eGuild Help"
      subtitle: "&7Commands available to guild members."
      lines: |-
        &6Creation:
        &e/guild create <name> <tag> &8- &7Start guild creation
        &e/guild create confirm &8- &7Confirm guild creation
        &6Members:
        &e/guild invite <nick> &8- &7Invite a player
        &e/guild invite cancel &8- &7Cancel sent invitations
        &e/guild invite decline <tag> &8- &7Decline invitation
        &e/guild join <tag> &8- &7Join a guild
        &e/guild leave &8- &7Leave the guild
        &e/guild kick <nick> &8- &7Kick a member
        &6Ranks:
        &e/guild promote <nick> [rank] &8- &7Promote a member
        &e/guild demote <nick> [rank] &8- &7Demote a member
        &e/guild leader <nick> &8- &7Transfer leadership
        &6Management:
        &e/guild sethome &8- &7Set guild home
        &e/guild home &8- &7Teleport to guild home
        &e/guild description <text> &8- &7Set guild description
        &e/guild flag <flag> <true/false> &8- &7Change guild flag
        &e/guild ban <nick> [reason] &8- &7Ban a player
        &e/guild unban <nick> &8- &7Unban a player
        &e/guild banlist &8- &7Banned list
        &e/guild requests &8- &7Join requests list
        &e/guild joinaccept <nick> &8- &7Accept request
        &e/guild joindecline <nick> &8- &7Decline request
        &e/guild disband &8- &7Disband the guild
        &e/guild disband confirm &8- &7Confirm disband
        &6Relations:
        &e/guild ally <tag> &8- &7Send ally request
        &e/guild allyaccept <tag> &8- &7Accept ally request
        &e/guild allydecline <tag> &8- &7Decline ally request
        &e/guild enemy <tag> &8- &7Set enemy relation
        &e/guild neutral <tag> &8- &7Set neutral relation
        &e/guild relations &8- &7List allies and enemies
        &6Cuboid:
        &e/guild cuboidflag [flag] [value] &8- &7Manage cuboid flags
        &e/guild info [tag] &8- &7Guild information
    admin:
      title: "&6&lFractionCore &8» &eAdmin Help"
      subtitle: "&7Plugin management commands."
      lines: |-
        &e/guild admin module <list|enable|disable|reload> [module] &8- &7Manage modules
        &e/guild admin lang <reload|reset> &8- &7Reload / reset languages
        &e/guild admin reload &8- &7Reload configuration
        &e/guild admin debug <true|false> &8- &7Debug mode
        &e/guild admin plugin reload &8- &7Reload plugin (requires PlugMan)
  usage:
    base: "&eUsage: {usage}"
    create: "&eUsage: /guild create <name> <tag>"
    create_confirm: "&eNext: /guild create confirm"
    flag: "&eUsage: /guild flag <flag> <true/false>"
