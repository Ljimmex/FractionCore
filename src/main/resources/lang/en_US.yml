# FractionCore v2.0 - English translation
# Format: MiniMessage (<color>) + legacy (&k) -- both supported

prefix:
  info: "<dark_gray>[<aqua>Guild<dark_gray>] <gray>"
  error: "<dark_gray>[<red>Guild<dark_gray>] <red>"
  success: "<dark_gray>[<green>Guild<dark_gray>] <green>"
  warning: "<dark_gray>[<yellow>Guild<dark_gray>] <yellow>"

placeholders:
  not_available: "N/A"

general:
  no_permission: "You do not have permission to use this command."
  player_only: "This command is only available to players."
  console_only: "This command is only available from console."
  usage: "Usage: {usage}"
  unknown_command: "Unknown command. Use /guild help to see available commands."
  reload_success: "Reloaded {count} language files."
  reload_error: "An error occurred while reloading languages: {error}"

guild:
  create:
    success: "<green>Guild created successfully!</green>"
    error_name_taken: "Guild <red>{name}</red> already exists!"
    error_tag_taken: "Tag <red>[{tag}]</red> is already taken!"
    error_name_invalid: "<red>Invalid characters in guild name!</red> You entered: <yellow>{name}</yellow>. <gray>Allowed: letters, numbers, spaces, _</gray>"
    error_tag_invalid: "<red>Invalid characters in guild tag!</red> You entered: <yellow>{tag}</yellow>. <gray>Allowed: letters and numbers</gray>"
    error_name_too_short: "<red>Guild name is too short.</red> Min: <yellow>{min}</yellow> characters (you entered <yellow>{current}</yellow>)."
    error_name_too_long: "<red>Guild name is too long.</red> Max: <yellow>{max}</yellow> characters (you entered <yellow>{current}</yellow>)."
    error_tag_too_short: "<red>Guild tag is too short.</red> Min: <yellow>{min}</yellow> characters (you entered <yellow>{current}</yellow>)."
    error_tag_too_long: "<red>Guild tag is too long.</red> Max: <yellow>{max}</yellow> characters (you entered <yellow>{current}</yellow>)."
    error_items: "<red>You don't have enough items to create a guild!</red> You need: <yellow>{items}</yellow>"
    error_insufficient_items: "<red>You don't have enough items to create a guild!</red>"
    error_location: "<red>You cannot create a guild here.</red> Too close to another guild (min. <yellow>{radius}</yellow> blocks)."
    error_too_close_to_spawn: "<red>You are too close to spawn!</red> Distance: <yellow>{current}</yellow>/<yellow>{required}</yellow> blocks. Remaining: <yellow>{remaining}</yellow>"
    error_too_close_to_other_guild: "<red>You are too close to another guild!</red> Distance: <yellow>{current}</yellow>/<yellow>{required}</yellow> blocks. Remaining: <yellow>{remaining}</yellow>"
    error_world: "<red>Guild creation is disabled in this world.</red>"
    error_blocked_world: "<red>Guild creation is disabled in world <yellow>{world}</yellow>.</red>"
    error_cost: "<red>You don't have enough currency.</red> You need: <yellow>{amount}</yellow>"
    error_already_in_guild: "<red>You already belong to a guild.</red>"
    error_cooldown: "<red>You must wait <yellow>{minutes}</yellow> minutes before creating a new guild.</red>"
    error_invalid_location: "<red>Invalid location to create a guild.</red>"
    error_no_pending_request: "<red>You have no pending guild creation request.</red> Use /guild create <name> <tag> [color]."
    error_generic: "<red>An error occurred while creating the guild.</red>"
  invite:
    sent: "<green>Invitation sent to player <yellow>{player}</yellow>!"
    received: "<green>You received an invitation to guild <aqua>{guild}</aqua> from <yellow>{sender}</yellow>."
    accept_hover: "Click to join guild {guild}!"
    hint: "<gray>To accept type <yellow>/guild join {tag}</yellow>, to decline <yellow>/guild invite decline {tag}</yellow>."
    cancel: "<green>All pending invitations have been cancelled."
    declined: "<yellow>You declined the invitation to guild <aqua>{guild}</aqua>."
    error_no_permission: "<red>You don't have permission to invite players.</red>"
    error_already_member: "<red>Player {player} is already a member of your guild!</red>"
    error_has_guild: "<red>Player {player} already belongs to another guild.</red>"
    error_self: "<red>You cannot invite yourself!</red>"
    error_banned: "<red>Player {player} is banned from this guild.</red>"
    error_max_members: "<red>The guild has reached the maximum member count.</red>"
    error_max_invites: "<red>The guild has reached the pending invitation limit.</red>"
    error_no_invite: "<red>You don't have a pending invitation to guild <yellow>{tag}</yellow>.</red>"
  join:
    success: "<green>You joined guild <aqua>{guild}</aqua>!"
    broadcast: "<green>Player <yellow>{player}</yellow> joined the guild!"
    welcome: "<green>Welcome to guild <aqua>{guild}</aqua>!"
    error_no_permission: "<red>You don't have permission to join a guild.</red>"
    error_no_invite: "<red>You don't have an active invitation to guild <yellow>{tag}</yellow>.</red>"
    error_banned: "<red>You are banned from this guild.</red>"
    error_already_in_guild: "<red>You already belong to a guild.</red>"
    error_cooldown: "<red>You must wait <yellow>{minutes}</yellow> minutes before joining a new guild.</red>"
    error_insufficient_items: "<red>You don't have enough items to join the guild!</red> You need: <yellow>{items}</yellow>"
  leave:
    success: "<yellow>You left guild <aqua>{guild}</aqua>."
    broadcast: "<yellow>Player <red>{player}</red> left the guild."
    error_no_permission: "<red>You don't have permission to leave the guild.</red>"
    error_leader_cannot_leave: "<red>The leader cannot leave the guild. Transfer leadership or disband the guild.</red>"
  disband:
    success: "<red>Guild <aqua>{guild}</aqua> has been disbanded."
    broadcast: "<dark_red>Guild <red>{guild}</red> no longer exists!"
  kick:
    success: "<green>You kicked player <yellow>{player}</yellow> from the guild."
    broadcast: "<yellow>Player <red>{player}</red> was kicked from the guild."
    target_message: "<red>You have been kicked from guild <aqua>{guild}</aqua>.</red>"
    error_no_permission: "<red>You don't have permission to kick members.</red>"
    error_self: "<red>You cannot kick yourself.</red>"
    error_leader_kick: "<red>You cannot kick the guild leader.</red>"
    error_target_higher_rank: "<red>You cannot kick a player with higher or equal rank.</red>"
  ban:
    success: "<red>You banned player <yellow>{player}</yellow> from the guild.</red>"
    broadcast: "<red>Player <yellow>{player}</yellow> was banned from the guild.</red>"
    error_no_permission: "<red>You don't have permission to ban players.</red>"
    error_target_higher_rank: "<red>You cannot ban a player with higher or equal rank.</red>"
    error_already_banned: "<red>Player {player} is already banned in this guild.</red>"
  unban:
    success: "<green>You unbanned player <yellow>{player}</yellow> from the guild."
    error_no_permission: "<red>You don't have permission to unban players.</red>"
    error_not_banned: "<red>Player {player} is not banned in this guild.</red>"
  banlist:
    header: "<dark_gray>=== Ban list for guild <aqua>{guild}</aqua> <dark_gray>[<yellow>{tag}</yellow><dark_gray>] (<aqua>{count}</aqua>) ==="
    entry: "<gray>- <red>{player}</red> | Banned by: <yellow>{banner}</yellow> | Reason: <gray>{reason}</gray> | Date: <yellow>{date}</yellow>"
    empty: "<green>Guild <aqua>{guild}</aqua> has no active bans."
    error_no_permission: "<red>You don't have permission to view the ban list.</red>"
  promote:
    success: "<green>You promoted player <yellow>{player}</yellow> from rank <gray>{old_rank}</gray> to rank <aqua>{rank}</aqua>."
    broadcast: "<green>Player <yellow>{player}</yellow> has been promoted to rank <aqua>{rank}</aqua>."
    target_message: "<green>You have been promoted to rank <aqua>{rank}</aqua> in guild <aqua>{guild}</aqua>."
    error_no_permission: "<red>You don't have permission to promote members.</red>"
    error_target_higher_rank: "<red>You cannot promote a player with higher or equal rank.</red>"
    error_max_rank: "<red>Player {player} already has the highest possible rank.</red>"
    error_invalid_rank: "<red>Rank <yellow>{rank}</yellow> not found.</red>"
    error_same_rank: "<red>Player <yellow>{player}</yellow> already has rank <aqua>{rank}</aqua>.</red>"
    error_target_lower_rank: "<red>You cannot promote a player to a lower or equal rank <aqua>{rank}</aqua>.</red>"
    error_leader_promote: "<red>To appoint a new leader use <yellow>/guild leader <nick></yellow>.</red>"
  demote:
    success: "<yellow>You demoted player <red>{player}</red> from rank <gray>{old_rank}</gray> to rank <aqua>{rank}</aqua>."
    broadcast: "<yellow>Player <red>{player}</red> has been demoted to rank <aqua>{rank}</aqua>."
    target_message: "<yellow>You have been demoted to rank <aqua>{rank}</aqua> in guild <aqua>{guild}</aqua>."
    error_no_permission: "<red>You don't have permission to demote members.</red>"
    error_target_higher_rank: "<red>You cannot demote a player with higher or equal rank.</red>"
    error_min_rank: "<red>Player {player} already has the lowest rank.</red>"
    error_invalid_rank: "<red>Rank <yellow>{rank}</yellow> not found.</red>"
    error_same_rank: "<red>Player <yellow>{player}</yellow> already has rank <aqua>{rank}</aqua>.</red>"
    error_target_rank_higher: "<red>You cannot demote a player to a higher rank <aqua>{rank}</aqua>.</red>"
    error_leader_demote: "<red>You cannot demote the guild leader.</red>"
  leader:
    success: "<green>You transferred leadership to player <yellow>{player}</yellow>."
    broadcast: "<green>Player <yellow>{player}</yellow> is now the leader of guild <aqua>{guild}</aqua>."
    target_message: "<green>You are now the leader of guild <aqua>{guild}</aqua>."
    error_no_permission: "<red>Only the leader can transfer leadership.</red>"
    error_self: "<red>You cannot transfer leadership to yourself.</red>"
  info:
    header: "<dark_gray>=== <aqua>{guild}</aqua> <dark_gray>[<yellow>{tag}</yellow><dark_gray>] ==="
    leader: "<gray>Leader: <aqua>{leader}</aqua>"
    points: "<gray>Points: <aqua>{points}</aqua>"
    level: "<gray>Level: <aqua>{level}</aqua>"
    members: "<gray>Members: <aqua>{members}</aqua>"
    created: "<gray>Created: <aqua>{date}</aqua>"
  not_found: "<red>Guild not found.</red>"
  no_guild: "<red>You do not belong to any guild.</red>"
  not_member: "<red>Player {player} is not a member of your guild.</red>"

egg:
  damaged: "<red><bold>WARNING!</bold></red> Your guild egg has been damaged! Remaining lives: <yellow>{lives}/{max_lives}</yellow>."
  destroyed: "<dark_red><bold>ALERT!</bold></dark_red> Guild egg of <aqua>{guild}</aqua> has been destroyed! The guild will fall in <yellow>{time}</yellow>."
  repaired: "<green>Guild egg has been repaired!</green> Current state: <green>{lives}/{max_lives}</green>."
  shield_activated: "<green>Activated guild egg shield for <yellow>{time}</yellow>."
  shield_expired: "<yellow>Guild egg shield has expired.</yellow>"

module:
  reload_success: "Reloaded module <aqua>{module}</aqua>."
  reload_all_success: "Reloaded all modules."
  enable_success: "Enabled module <aqua>{module}</aqua>."
  disable_success: "Disabled module <aqua>{module}</aqua>."
  not_found: "Module <red>{module}</red> not found."
  disabled: "Module <red>{module}</red> is disabled in configuration."
