      reloaded: "&aReloaded module '{module}'."
      reload_failed: "&cFailed to reload module '{module}'."
      reload_all_success: "&aReloaded all modules."
    lang:
      module_inactive: "<red>Language module is not active.</red>"
      reload_success: "&aReloaded language files."
      reset_success: "&aReset language files to defaults."
