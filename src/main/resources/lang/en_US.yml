    target_broadcast: "<red>Guild <aqua>{guild}</aqua> <dark_gray>[<yellow>{tag}</yellow><dark_gray>] has declared you an enemy!</red>"
    error_no_permission: "<red>Only the leader or co-leader can manage relations.</red>"
    error_self: "<red>You cannot set a relation with your own guild.</red>"
    error_generic: "<red>An error occurred while declaring enmity.</red>"
  neutral:
    success: "<green>You set a neutral relation with guild <aqua>{target}</aqua> <dark_gray>[<yellow>{target_tag}</yellow><dark_gray>]."
    error_no_permission: "<red>Only the leader or co-leader can manage relations.</red>"
    error_self: "<red>You cannot set a relation with your own guild.</red>"
    error_generic: "<red>An error occurred while setting a neutral relation.</red>"
  relations:
    ally_entry: "<dark_gray>- <dark_aqua>Ally: <aqua>{target}</aqua> <dark_gray>[<yellow>{target_tag}</yellow><dark_gray>]"
    enemy_entry: "<dark_gray>- <red>Enemy: <aqua>{target}</aqua> <dark_gray>[<yellow>{target_tag}</yellow><dark_gray>]"
    request_entry: "<dark_gray>- <yellow>Pending request from <aqua>{target}</aqua> <dark_gray>[<yellow>{target_tag}</yellow><dark_gray>]"
    no_allies: "<gray>No allies."
    no_enemies: "<gray>No enemies."
    error_generic: "<red>An error occurred while fetching relations.</red>"
    list_header: "<gold>=== Relations of guild {guild} [{tag}] ==="
    incoming_requests_header: "<yellow>Pending ally proposals:"
