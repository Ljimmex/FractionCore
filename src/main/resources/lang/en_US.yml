    request_received: "<yellow>Guild <aqua>{guild}</aqua> <dark_gray>[<yellow>{tag}</yellow><dark_gray>] sent an ally request. Use <yellow>/guild allyaccept {tag}</yellow> or <yellow>/guild allydecline {tag}</yellow>."
    accept_success: "<green>You formed an alliance with guild <aqua>{target}</aqua> <dark_gray>[<yellow>{target_tag}</yellow><dark_gray>]."
    accept_broadcast: "<green>Player <yellow>{player}</yellow> formed an alliance with guild <aqua>{target}</aqua> <dark_gray>[<yellow>{target_tag}</yellow><dark_gray>]."
    accepted_by: "<green>Guild <aqua>{guild}</aqua> <dark_gray>[<yellow>{tag}</yellow><dark_gray>] accepted the ally request."
    decline_success: "<red>You declined the ally request from guild <aqua>{target}</aqua> <dark_gray>[<yellow>{target_tag}</yellow><dark_gray>]."
    error_no_permission: "<red>Only the leader or co-leader can manage alliances.</red>"
    error_self: "<red>You cannot set a relation with your own guild.</red>"
    error_already_ally: "<red>Your guild is already allied with <aqua>{target}</aqua> <dark_gray>[<yellow>{target_tag}</yellow><dark_gray>]."
    error_request_already_sent: "<red>You already sent an ally request to guild <aqua>{target}</aqua> <dark_gray>[<yellow>{target_tag}</yellow><dark_gray>]."
    error_no_request: "<red>Guild <aqua>{target}</aqua> <dark_gray>[<yellow>{target_tag}</yellow><dark_gray>] did not send an ally request.</red>"
    error_generic: "<red>An error occurred while managing the alliance.</red>"
  enemy:
