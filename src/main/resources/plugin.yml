name: FractionCore
version: '${version}'
description: '${description}'
main: pl.Ljimmex.fractionCore.FractionCore
api-version: '1.20'
load: POSTWORLD
authors: [Ljimex]
website: https://github.com/Ljimmex/FractionCore

permissions:
  fractioncore.command.guild:
    description: Allows use of the main /guild command
    default: true
  guild.user.*:
    description: All default guild member commands
    default: true
    children:
      guild.user.invite: true
      guild.user.join: true
      guild.user.leave: true
      guild.user.kick: true
      guild.user.promote: true
      guild.user.demote: true
      guild.user.leader: true
      guild.user.ban: true
      guild.user.unban: true
      guild.user.sethome: true
      guild.user.home: true
      guild.user.description: true
      guild.user.flag: true
      guild.user.requests: true
      guild.user.joinaccept: true
      guild.user.joindecline: true
      guild.user.disband: true
      guild.user.ally: true
      guild.user.allyaccept: true
      guild.user.allydecline: true
      guild.user.enemy: true
      guild.user.neutral: true
      guild.user.relations: true
      guild.user.cuboidflag: true
  guild.user.invite:
    description: Allows inviting players to the guild
    default: true
  guild.user.join:
    description: Allows accepting guild invitations
    default: true
  guild.user.leave:
    description: Allows leaving the guild
    default: true
  guild.user.kick:
    description: Allows kicking guild members
    default: true
  guild.user.promote:
    description: Allows promoting guild members
    default: true
  guild.user.demote:
    description: Allows demoting guild members
    default: true
  guild.user.leader:
    description: Allows transferring guild leadership
    default: true
  guild.user.ban:
    description: Allows banning players from the guild
    default: true
  guild.user.unban:
    description: Allows unbanning players from the guild
    default: true
  guild.user.sethome:
    description: Allows setting the guild home
    default: true
  guild.user.home:
    description: Allows teleporting to the guild home
    default: true
  guild.user.description:
    description: Allows editing the guild description
    default: true
  guild.user.flag:
    description: Allows changing guild flags
    default: true
  guild.user.requests:
    description: Allows listing guild join requests
    default: true
  guild.user.joinaccept:
    description: Allows accepting guild join requests
    default: true
  guild.user.joindecline:
    description: Allows declining guild join requests
    default: true
  guild.user.disband:
    description: Allows disbanding the guild
    default: true
  guild.user.ally:
    description: Allows sending ally requests
    default: true
  guild.user.allyaccept:
    description: Allows accepting ally requests
    default: true
  guild.user.allydecline:
    description: Allows declining ally requests
    default: true
  guild.user.enemy:
    description: Allows declaring enemy status
    default: true
  guild.user.neutral:
    description: Allows setting neutral relations
    default: true
  guild.user.relations:
    description: Allows viewing guild relations
    default: true
  guild.user.cuboidflag:
    description: Allows managing cuboid flags
    default: true
  fractioncore.admin:
    description: Allows access to admin commands
    default: op
  fractioncore.admin.module:
    description: Allows management of modules
    default: op
  fractioncore.admin.lang.reload:
    description: Allows reloading language files
    default: op
  fractioncore.admin.reload:
    description: Allows reloading configuration files
    default: op
  fractioncore.admin.debug:
    description: Allows toggling debug mode
    default: op

